<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>ScaffoldOS</title>
</head>

<body style="overflow: hidden; background-image: url(./GraphPaperBackground.jpg);">
    <!-- Taskbar -->
    <div 
    id = "taskbar"
    class="taskbar">
        <img style="object-fit:contain; margin-left: 16px; justify-content: start; border: black solid;" id = "Start" src="./ScaffoldOS.png"/>
        <p style="color: black; justify-content: start;">ScaffoldOS</p>
        <p id="timeElement" style="margin-right: 16px; color: black; justify-content: end;">Time</p>
    </div>
    
    <!-- Desktop Icons-->
    <!-- Desktop -->
    <div
    style="width: 100%; top: 25%; display: flex; justify-content: start;">

            <!-- This is a Clock App-->
        <div 
        id="clockApp" 
        class="icon">
            <div 
            style="padding: 0px; margin: 0px; text-align: center; width: fit-content;">
                <img src="Clock.png"/>
                <p style="margin: 0px;">Clock</p>
            </div>
        </div> 

            <!-- This is a Notes App-->
        <div 
        id="notesApp" 
        class="icon">
            <div 
            style="padding: 0px; margin: 0px; text-align: center; width: fit-content;">
                <img src="Notes.png"/>
                <p style="margin: 0px;">Notes</p>
            </div>
        </div> 
    </div>


    <!-- This is the welcome window -->
    <div 
    id="welcomeWindow"
    class="window"
    style="top: calc(30% + 60px); left: 30%;">
    <!-- Title Header-->
        <div 
        class="dragheader" 
        id="welcomeWindowheader">
            <div class="windowTitle">
                <p>Welcome Window</p>
            </div>
            <div class="closebutton" id="welcomeWindowclose">
                <p>X</p>
            </div>
        </div>

        <!-- Window Content-->
        <h1>ScaffoldOS</h1>
        <h2>Introduction</h2>
        <p>Hello, This Website was created by Lycotope<br>
        It was created for the "my webOS" mission<br></p>
        <p id="clockLink" class="windowLink">Clock App</p>
        <p id="notesLink" class="windowLink">Notes App</p>
    </div>


    <!-- This is a Clock App window-->
    <div 
    id="clockWindow"
    class="window"
    style="top: 55%; left: 75%; display: none; height: 640px;">

    <!-- Title Header-->
        <div 
        class="dragheader" 
        id="clockWindowheader">
            <div class="windowTitle">
                <p>Clock App</p>
            </div>
            <div class="closebutton" id="clockWindowclose">
                <p>X</p>
            </div>
        </div>
    <!-- Window Content-->
     <br>
        <p id="clockElement" style="margin-right: 16px; color: black; justify-content: end;">Time</p>
        <div id="clockVisual" style="height: 500px; width: 500px; border: black solid; justify-self: center; border-radius: 50%;">
            <div style="top: 50%; left: 50%;"></div>
            <div class="clockMinuteHand" id="minuteHand"></div>
            <div class="clockHourHand" id="hourHand"></div>
        </div>
    </div>

    <!-- This is a Clock App window-->
    <div 
    id="notesWindow"
    class="window"
    style="top: calc(50% - 180px); left: 45%; display: none; min-height: 200px;">

    <!-- Title Header-->
        <div 
        class="dragheader" 
        id="notesWindowheader">
            <div class="windowTitle">
                <p>Notes App</p>
            </div>
            <div class="closebutton" id="notesWindowclose">
                <p>X</p>
            </div>
        </div>
    <!-- Window Content-->
        <br><br>
        <textarea placeholder="Write your plan here" style="width: 630px; border: none; outline: none; height: 170px;"></textarea>
    </div>
    

    <script src="script.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />

</body>
</html>
