<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title> Stardance hack club website test</title>
</head>

<body>
    <!-- Taskbar -->
    <div 
    id = "taskbar"
    class="taskbar">
        <img style="object-fit:contain; margin-left: 16px; justify-content: start;" src="./ScaffoldOS.png"/>
        <p style="color: black; justify-content: start;">ScaffoldOS</p>
        <p id="timeElement" style="margin-right: 16px; color: black; justify-content: end;">Time</p>
    </div>
    
    <!-- This is the welcome window -->
    <div 
    id="welcomeWindow"
    class="window"
    style="top: 20%; left: 30%;">
    <!-- Title Header-->
        <div 
        class="dragheader" 
        id="welcomeWindowheader">
            <div class="windowTitle">
                <p>Welcome Window</p>
            </div>
            <div class="closebutton" id="welcomeWindowclose">
                <p>X</p>
            </div>
        </div>

        <!-- Window Content-->
        <h1>ScaffoldOS</h1>
        <h2>Introduction</h2>
        <p>Hello, This Website was created by Lycotope<br>
        It was created for the hackClub StarDance Challenge<br></p>
        <a href="https://www.instagram.com/starthackclub/">Instagram of HackClub</a>
    </div>

    <!-- This is a Clock App-->
    <div 
    id="clockApp" 
    style="padding: 64px;">
        <div 
        style="padding: 16px; text-align: center; width: fit-content;">
            <img src="Clock.png"/>
            <p style="margin: 0px;">Clock</p>
        </div>
    </div> 

    <!-- This is a Clock App window-->
    <div 
    id="clockWindow"
    class="window"
    style="top: 25%; left: 75%; display: none;">

    <!-- Title Header-->
        <div 
        class="dragheader" 
        id="clockWindowheader">
            <div class="windowTitle">
                <p>Clock App</p>
            </div>
            <div class="closebutton" id="clockWindowclose">
                <p>X</p>
            </div>
        </div>
    <!-- Window Content-->
        <p id="clockElement" style="margin-right: 16px; color: black; justify-content: end;">Time</p>
    </div>

    <script src="script.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />

</body>
</html>
